name: Deploy to S3 and EC2

on:
  push:
    branches:
      - main
      -master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP artifact
        run: zip -r mi-app.zip app docker-compose.yml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Upload artifact to S3
        run: aws s3 cp mi-app.zip s3://mi-pipeline-source-189399646295/mi-app.zip

      - name: Deploy on EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy app from GitHub Actions" \
            --parameters 'commands=[
              "cd /home/ubuntu || cd /home/ec2-user",
              "rm -rf app",
              "aws s3 cp s3://mi-pipeline-source-189399646295/mi-app.zip .",
              "unzip -o mi-app.zip",
              "cd app",
              "pip3 install -r requirements.txt || pip install -r requirements.txt",
              "pkill -f app.py || true",
              "nohup python3 app.py > app.log 2>&1 &"
            ]' \
            --region us-east-1
